components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # Auth
    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
      required:
        - email
        - password
        - displayName

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    RefreshTokenBody:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    ForgotPasswordBody:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    ResetPasswordBody:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
      required:
        - token
        - password

    VerifyEmailBody:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
        refreshToken:
          type: string
      required:
        - user
        - accessToken
        - refreshToken

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        role:
          type: string
          enum: [BUYER, ADMIN, SUPER_ADMIN]
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, PENDING, DELETED]
        emailVerifiedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - displayName
        - role
        - status
        - createdAt

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string

    UpdatePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
      required:
        - currentPassword
        - newPassword

    # Category
    Category:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        icon:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        packCount:
          type: integer
        isFeatured:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - name
        - packCount
        - isFeatured
        - sortOrder
        - createdAt

    CreateCategoryBody:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        color:
          type: string
        sortOrder:
          type: integer
        isFeatured:
          type: boolean
      required:
        - slug
        - name

    # Pack
    Pack:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        shortDescription:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        categorySlug:
          type: ["string", "null"]
        status:
          type: string
        aiToolTargets:
          type: array
          items:
            type: string
        promptCount:
          type: integer
        priceCents:
          type: integer
        comparePriceCents:
          type: ["integer", "null"]
        isFree:
          type: boolean
        isFeatured:
          type: boolean
        isBestseller:
          type: boolean
        thumbnailUrl:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        totalDownloads:
          type: integer
        avgRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        publishedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - categoryId
        - status
        - aiToolTargets
        - promptCount
        - priceCents
        - isFree
        - isFeatured
        - isBestseller
        - tags
        - totalDownloads
        - reviewCount
        - createdAt

    PackDetail:
      allOf:
        - $ref: "#/components/schemas/Pack"
        - type: object
          properties:
            description:
              type: ["string", "null"]
            seoTitle:
              type: ["string", "null"]
            seoDescription:
              type: ["string", "null"]
            previewImageUrl:
              type: ["string", "null"]
            prompts:
              type: array
              items:
                $ref: "#/components/schemas/PromptPreview"
            isPurchased:
              type: boolean
          required:
            - isPurchased

    PackListResponse:
      type: object
      properties:
        packs:
          type: array
          items:
            $ref: "#/components/schemas/Pack"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - packs
        - total
        - page
        - limit
        - totalPages

    AdminPack:
      allOf:
        - $ref: "#/components/schemas/Pack"
        - type: object
          properties:
            description:
              type: ["string", "null"]
            totalRevenueCents:
              type: integer
            moderatedAt:
              type: ["string", "null"]
              format: date-time
            publishedAt:
              type: ["string", "null"]
              format: date-time
            updatedAt:
              type: string
              format: date-time

    AdminPackDetail:
      allOf:
        - $ref: "#/components/schemas/AdminPack"
        - type: object
          properties:
            prompts:
              type: array
              items:
                $ref: "#/components/schemas/Prompt"
            files:
              type: array
              items:
                $ref: "#/components/schemas/GeneratedFile"
            moderationLogs:
              type: array
              items:
                $ref: "#/components/schemas/ModerationLog"

    AdminPackListResponse:
      type: object
      properties:
        packs:
          type: array
          items:
            $ref: "#/components/schemas/AdminPack"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - packs
        - total
        - page
        - limit
        - totalPages

    AdminCreatePackBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        categoryId:
          type: integer
        priceCents:
          type: integer
        isFree:
          type: boolean
        aiToolTargets:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
      required:
        - title
        - categoryId
        - priceCents

    AdminUpdatePackBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        categoryId:
          type: integer
        priceCents:
          type: integer
        comparePriceCents:
          type: integer
        isFree:
          type: boolean
        isFeatured:
          type: boolean
        isBestseller:
          type: boolean
        aiToolTargets:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        seoTitle:
          type: string
        seoDescription:
          type: string

    UpdateStatusBody:
      type: object
      properties:
        status:
          type: string
        notes:
          type: string
      required:
        - status

    ModerationActionBody:
      type: object
      properties:
        notes:
          type: string

    # Prompt
    PromptPreview:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        aiTool:
          type: ["string", "null"]
        useCase:
          type: ["string", "null"]
        isBlurred:
          type: boolean
        sortOrder:
          type: integer
      required:
        - id
        - title
        - body
        - isBlurred
        - sortOrder

    Prompt:
      type: object
      properties:
        id:
          type: integer
        packId:
          type: integer
        title:
          type: string
        body:
          type: string
        description:
          type: ["string", "null"]
        aiTool:
          type: ["string", "null"]
        useCase:
          type: ["string", "null"]
        exampleOutput:
          type: ["string", "null"]
        status:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - packId
        - title
        - body
        - status
        - sortOrder
        - createdAt

    UpdatePromptBody:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        description:
          type: string
        aiTool:
          type: string
        useCase:
          type: string
        exampleOutput:
          type: string
        sortOrder:
          type: integer

    # Review
    Review:
      type: object
      properties:
        id:
          type: integer
        packId:
          type: integer
        userId:
          type: integer
        userDisplayName:
          type: string
        userAvatarUrl:
          type: ["string", "null"]
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        isVerified:
          type: boolean
        helpfulCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - packId
        - userId
        - userDisplayName
        - rating
        - isVerified
        - helpfulCount
        - createdAt

    ReviewListResponse:
      type: object
      properties:
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
        avgRating:
          type: ["number", "null"]
        ratingDistribution:
          type: object
          additionalProperties:
            type: integer
      required:
        - reviews
        - total
        - page
        - limit
        - totalPages

    CreateReviewBody:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
        body:
          type: string
      required:
        - rating

    # Order
    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED, REFUNDED, DISPUTED]
        subtotalCents:
          type: integer
        discountCents:
          type: integer
        taxCents:
          type: integer
        totalCents:
          type: integer
        currency:
          type: string
        stripePaymentIntentId:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
      required:
        - id
        - userId
        - status
        - subtotalCents
        - discountCents
        - taxCents
        - totalCents
        - currency
        - createdAt

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        packId:
          type: integer
        packSlug:
          type: string
        titleSnapshot:
          type: string
        priceCents:
          type: integer
        downloadCount:
          type: integer
        firstDownloadedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - packId
        - packSlug
        - titleSnapshot
        - priceCents
        - downloadCount

    OrderDetail:
      allOf:
        - $ref: "#/components/schemas/Order"

    # Checkout
    CreateCheckoutBody:
      type: object
      properties:
        packIds:
          type: array
          items:
            type: integer
        couponCode:
          type: string
      required:
        - packIds

    ClaimFreeBody:
      type: object
      properties:
        packId:
          type: integer
      required:
        - packId

    CheckoutSessionResponse:
      type: object
      properties:
        sessionUrl:
          type: string
        sessionId:
          type: string
        orderId:
          type: integer
        isMock:
          type: boolean
      required:
        - orderId
        - isMock

    # Coupon
    ValidateCouponBody:
      type: object
      properties:
        code:
          type: string
        subtotalCents:
          type: integer
      required:
        - code

    Coupon:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        discountType:
          type: string
          enum: [PERCENT, FIXED]
        discountValue:
          type: number
        minOrderCents:
          type: ["integer", "null"]
        maxUses:
          type: ["integer", "null"]
        usesCount:
          type: integer
        validFrom:
          type: ["string", "null"]
          format: date-time
        validUntil:
          type: ["string", "null"]
          format: date-time
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - code
        - discountType
        - discountValue
        - usesCount
        - isActive
        - createdAt

    CouponValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
        coupon:
          $ref: "#/components/schemas/Coupon"
        discountCents:
          type: integer
        message:
          type: string
      required:
        - valid
        - discountCents
        - message

    CreateCouponBody:
      type: object
      properties:
        code:
          type: string
        discountType:
          type: string
          enum: [PERCENT, FIXED]
        discountValue:
          type: number
        minOrderCents:
          type: integer
        maxUses:
          type: integer
        validFrom:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time
        isActive:
          type: boolean
      required:
        - code
        - discountType
        - discountValue

    # Automation
    AutomationJob:
      type: object
      properties:
        id:
          type: integer
        jobType:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING, COMPLETED, FAILED, RETRYING, DEAD]
        priority:
          type: integer
        payload:
          type: object
        result:
          type: ["object", "null"]
        errorMessage:
          type: ["string", "null"]
        retryCount:
          type: integer
        maxRetries:
          type: integer
        relatedPackId:
          type: ["integer", "null"]
        triggeredBy:
          type: ["string", "null"]
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        durationMs:
          type: ["integer", "null"]
        aiTokensUsed:
          type: ["integer", "null"]
        aiCostUsdCents:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - jobType
        - status
        - priority
        - payload
        - retryCount
        - maxRetries
        - createdAt

    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/AutomationJob"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - jobs
        - total
        - page
        - limit
        - totalPages

    TriggerJobBody:
      type: object
      properties:
        jobType:
          type: string
          enum: [GENERATE_PROMPTS, GENERATE_PACK, GENERATE_PDF, GENERATE_ZIP, GENERATE_IMAGE, CREATE_LISTING]
        packId:
          type: integer
        payload:
          type: object
      required:
        - jobType

    # Generated file
    GeneratedFile:
      type: object
      properties:
        id:
          type: integer
        packId:
          type: integer
        fileType:
          type: string
          enum: [PDF, ZIP, THUMBNAIL, PREVIEW_IMAGE]
        status:
          type: string
          enum: [QUEUED, GENERATING, READY, FAILED]
        publicUrl:
          type: ["string", "null"]
        fileSizeBytes:
          type: ["integer", "null"]
        generationCompletedAt:
          type: ["string", "null"]
          format: date-time
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - packId
        - fileType
        - status
        - createdAt

    FileListResponse:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedFile"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - files
        - total
        - page
        - totalPages

    # Moderation log
    ModerationLog:
      type: object
      properties:
        id:
          type: integer
        entityType:
          type: string
        entityId:
          type: integer
        action:
          type: string
          enum: [APPROVE, REJECT, FLAG, EDIT_AND_APPROVE]
        adminId:
          type: integer
        notes:
          type: ["string", "null"]
        beforeStatus:
          type: ["string", "null"]
        afterStatus:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - entityType
        - entityId
        - action
        - adminId
        - createdAt

    # Admin Dashboard
    AdminDashboard:
      type: object
      properties:
        totalRevenueCents:
          type: integer
        totalOrders:
          type: integer
        totalUsers:
          type: integer
        totalPacks:
          type: integer
        publishedPacks:
          type: integer
        pendingModerationCount:
          type: integer
        activeJobsCount:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        revenueByDay:
          type: array
          items:
            $ref: "#/components/schemas/RevenueDataPoint"
      required:
        - totalRevenueCents
        - totalOrders
        - totalUsers
        - totalPacks
        - publishedPacks
        - pendingModerationCount
        - activeJobsCount
        - recentOrders
        - revenueByDay

    RevenueDataPoint:
      type: object
      properties:
        date:
          type: string
        revenueCents:
          type: integer
        orders:
          type: integer
      required:
        - date
        - revenueCents
        - orders

    AnalyticsResponse:
      type: object
      properties:
        totalRevenueCents:
          type: integer
        totalOrders:
          type: integer
        totalDownloads:
          type: integer
        newUsers:
          type: integer
        revenueByDay:
          type: array
          items:
            $ref: "#/components/schemas/RevenueDataPoint"
        topPacks:
          type: array
          items:
            $ref: "#/components/schemas/PackStats"
        searchTerms:
          type: array
          items:
            $ref: "#/components/schemas/SearchTerm"
      required:
        - totalRevenueCents
        - totalOrders
        - totalDownloads
        - newUsers
        - revenueByDay
        - topPacks
        - searchTerms

    PackStats:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        totalDownloads:
          type: integer
        totalRevenueCents:
          type: integer
        avgRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
      required:
        - id
        - title
        - slug
        - totalDownloads
        - totalRevenueCents
        - reviewCount

    SearchTerm:
      type: object
      properties:
        term:
          type: string
        count:
          type: integer
      required:
        - term
        - count

    UserListResponse:
      type: object
      properties:
